<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="gradiente — software development." />
    <meta name="theme-color" content="#09090b" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>gradiente</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body class="bg-zinc-950 text-zinc-200 antialiased min-h-screen overflow-hidden">
    <div class="fixed inset-0 -z-10 overflow-hidden">
      <div
        class="animate-blob-a absolute left-1/2 top-1/2 h-[30vmin] w-[30vmin] -translate-x-1/2 -translate-y-1/2 rounded-full bg-gradient-to-br from-fuchsia-500 via-rose-500 to-amber-400 blur-[60px] [--peak:0.5]"
      ></div>
      <div
        class="animate-blob-b absolute left-1/2 top-1/2 -ml-[8vmin] -mt-[5vmin] h-[22vmin] w-[22vmin] -translate-x-1/2 -translate-y-1/2 rounded-full bg-gradient-to-br from-indigo-500 to-violet-600 blur-[60px] [--peak:0.4]"
      ></div>
      <div
        class="animate-blob-c absolute left-1/2 top-1/2 ml-[7vmin] mt-[5vmin] h-[20vmin] w-[20vmin] -translate-x-1/2 -translate-y-1/2 rounded-full bg-gradient-to-tr from-cyan-400 to-blue-500 blur-[60px] [--peak:0.35]"
      ></div>
    </div>

    <main class="relative flex min-h-screen flex-col items-center justify-center px-6">
      <h1
        class="bg-gradient-to-br from-fuchsia-200 via-rose-300 to-amber-200 bg-clip-text pb-2 text-5xl font-bold leading-[1.15] tracking-tight text-transparent select-none sm:text-6xl md:text-7xl lg:text-8xl"
      >
        gradiente
      </h1>
      <p class="mt-5 max-w-md text-center text-base text-zinc-300 sm:text-lg">
        we design and build software.
      </p>
      <p class="mt-3 text-xs tracking-[0.25em] text-zinc-400 sm:text-sm">
        web development <span class="mx-2 text-zinc-700">·</span> mobile apps
      </p>
      <a
        href="mailto:luis@gradiente.dev"
        class="mt-10 text-sm tracking-wide text-zinc-400 transition-colors hover:text-zinc-100 sm:text-base"
      >
        luis@gradiente.dev
      </a>
    </main>
  </body>
</html>
